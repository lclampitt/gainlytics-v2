<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gainlytics</title>
    <!-- Anti-flash: apply saved theme before React renders -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gainlytics_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
